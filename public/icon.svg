<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="#0D1117"/>
  <circle cx="256" cy="256" r="220" fill="#161B22"/>
  
  <!-- Git Branch Icon -->
  <g transform="translate(256, 256)">
    <!-- Main branch line -->
    <line x1="-80" y1="-100" x2="-80" y2="100" stroke="#58A6FF" stroke-width="16" stroke-linecap="round"/>
    
    <!-- Feature branch -->
    <line x1="-80" y1="0" x2="40" y2="0" stroke="#3FB950" stroke-width="16" stroke-linecap="round"/>
    <line x1="40" y1="0" x2="40" y2="-60" stroke="#3FB950" stroke-width="16" stroke-linecap="round"/>
    
    <!-- Merge line -->
    <path d="M 40 -60 Q 10 -80, -80 -100" stroke="#F778BA" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Branch nodes -->
    <circle cx="-80" cy="-100" r="18" fill="#58A6FF" stroke="#0D1117" stroke-width="4"/>
    <circle cx="-80" cy="0" r="18" fill="#58A6FF" stroke="#0D1117" stroke-width="4"/>
    <circle cx="-80" cy="100" r="18" fill="#58A6FF" stroke="#0D1117" stroke-width="4"/>
    <circle cx="40" cy="0" r="18" fill="#3FB950" stroke="#0D1117" stroke-width="4"/>
    <circle cx="40" cy="-60" r="18" fill="#3FB950" stroke="#0D1117" stroke-width="4"/>
    
    <!-- Command Terminal Symbol -->
    <g transform="translate(0, -140)">
      <text x="0" y="0" font-family="monospace" font-size="60" font-weight="bold" fill="#F778BA" text-anchor="middle">
        &gt;_
      </text>
    </g>
    
    <!-- GitHub Octocat silhouette (simplified) -->
    <g transform="translate(80, 80) scale(0.8)">
      <circle cx="0" cy="0" r="35" fill="#58A6FF"/>
      <circle cx="-12" cy="-8" r="6" fill="#0D1117"/>
      <circle cx="12" cy="-8" r="6" fill="#0D1117"/>
      <path d="M -15 8 Q 0 15, 15 8" stroke="#0D1117" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Outer glow effect -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#58A6FF" stroke-width="4" opacity="0.3"/>
</svg>
