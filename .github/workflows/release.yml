name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Linux binary
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o ../github-command-center-linux-amd64 .

      - name: Build macOS binary (amd64)
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o ../github-command-center-macos-amd64 .

      - name: Build macOS binary (arm64 / Apple Silicon)
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o ../github-command-center-macos-arm64 .

      - name: Build Windows binary
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 \
            go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
            -o ../github-command-center-windows-amd64.exe .

      - name: Create release archives
        run: |
          VERSION=${{ github.ref_name }}

          # Linux tarball
          mkdir -p release/linux
          cp github-command-center-linux-amd64 release/linux/github-command-center
          cp -r dist release/linux/
          cp .env.example release/linux/
          tar -czf github-command-center-${VERSION}-linux-amd64.tar.gz -C release/linux .

          # macOS tarball (amd64)
          mkdir -p release/macos-amd64
          cp github-command-center-macos-amd64 release/macos-amd64/github-command-center
          cp -r dist release/macos-amd64/
          cp .env.example release/macos-amd64/
          tar -czf github-command-center-${VERSION}-macos-amd64.tar.gz -C release/macos-amd64 .

          # macOS tarball (arm64)
          mkdir -p release/macos-arm64
          cp github-command-center-macos-arm64 release/macos-arm64/github-command-center
          cp -r dist release/macos-arm64/
          cp .env.example release/macos-arm64/
          tar -czf github-command-center-${VERSION}-macos-arm64.tar.gz -C release/macos-arm64 .

          # Windows zip
          mkdir -p release/windows
          cp github-command-center-windows-amd64.exe release/windows/github-command-center.exe
          cp -r dist release/windows/
          cp .env.example release/windows/
          zip -r github-command-center-${VERSION}-windows-amd64.zip release/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GitHub Command Center ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            github-command-center-${{ github.ref_name }}-linux-amd64.tar.gz
            github-command-center-${{ github.ref_name }}-macos-amd64.tar.gz
            github-command-center-${{ github.ref_name }}-macos-arm64.tar.gz
            github-command-center-${{ github.ref_name }}-windows-amd64.zip
          body: |
            ## GitHub Command Center ${{ github.ref_name }}

            A powerful self-hosted GitHub Desktop alternative.

            ### Quick Start

            1. Download the archive for your OS below
            2. Extract and copy `.env.example` → `.env`, fill in your GitHub token
            3. Run `./github-command-center`
            4. Open http://localhost:8765

            ### Downloads
            | Platform | Architecture | Download |
            |----------|-------------|---------|
            | Linux | x86_64 | `github-command-center-${{ github.ref_name }}-linux-amd64.tar.gz` |
            | macOS | Intel | `github-command-center-${{ github.ref_name }}-macos-amd64.tar.gz` |
            | macOS | Apple Silicon | `github-command-center-${{ github.ref_name }}-macos-arm64.tar.gz` |
            | Windows | x86_64 | `github-command-center-${{ github.ref_name }}-windows-amd64.zip` |

            See [CHANGELOG.md](CHANGELOG.md) for full details.
